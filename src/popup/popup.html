<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Egypt Prayer Times</title>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="islamic-logo" aria-hidden="true">
        <svg width="44" height="44" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M70 15A35 35 0 1 1 35 85A25 25 0 1 0 70 15Z" fill="#0d6efd"/>
          <path d="M72 28L75 38H85L77 45L80 55L72 48L64 55L67 45L59 38H69L72 28Z" fill="#ffffff" stroke="#0d6efd" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="header-top">
        <h1 class="title" data-i18n="extName">Egypt Prayer Times</h1>
        <button id="btn-settings" class="icon-btn" aria-label="Settings" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>
      <div class="current-time" id="current-time">--:--:--</div>
      <div class="current-date" id="current-date">---</div>
    </header>

    <section class="next-prayer" id="next-prayer-card">
      <div class="next-prayer-label" data-i18n="NextPrayer">Next Prayer</div>
      <div class="next-prayer-name" id="next-prayer-name">--</div>
      <div class="next-prayer-countdown" id="next-prayer-countdown">00:00:00</div>
      <div class="next-prayer-time" id="next-prayer-time">--:--</div>
      <button id="btn-expand" class="expand-btn" data-i18n="Expand">Expand</button>
    </section>

    <section class="prayer-list" id="prayer-list" role="list" aria-label="Prayer times">
      <!-- Populated by JS -->
    </section>

    <footer class="footer">
      <div class="status-row">
        <span class="status-dot" id="status-dot" aria-hidden="true"></span>
        <span class="status-text" id="status-text" data-i18n="Calculated">Calculated</span>
      </div>
      <div class="attribution">
        © 2026 Ahmed Mohamed Gamal · v1.0.0 ·
        <a href="https://www.linkedin.com/in/ahmed-mohamed-gamal-007aa4192/" target="_blank">LinkedIn</a> ·
        <a href="mailto:ahmedgamal172000@gmail.com">Contact</a>
      </div>
    </footer>
  </div>
</body>
</html>
