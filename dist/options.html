<!doctype html><html lang="en" dir="ltr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Settings - Egypt Prayer Times</title></head><body><div class="page"><div class="card"><h1 class="page-title" data-i18n="Settings">Settings</h1><div class="form-group"><label for="city" data-i18n="City">City</label> <select id="city"></select></div><div class="form-group"><label for="method" data-i18n="CalculationMethod">Calculation Method</label> <select id="method"><option value="5" data-i18n="MethodEgyptian">Egyptian General Authority of Survey</option><option value="1" data-i18n="MethodMWL">Muslim World League</option><option value="2" data-i18n="MethodISNA">Islamic Society of North America</option><option value="4" data-i18n="MethodMakkah">Umm Al-Qura University, Makkah</option></select></div><div class="form-group"><label for="time-format" data-i18n="TimeFormat">Time Format</label> <select id="time-format"><option value="12h" data-i18n="Hour12">12-hour</option><option value="24h" data-i18n="Hour24">24-hour</option></select></div><div class="form-group"><label for="language" data-i18n="Language">Language</label> <select id="language"><option value="en" data-i18n="English">English</option><option value="ar" data-i18n="Arabic">Arabic</option></select></div><div class="form-group"><label for="provider" data-i18n="Provider">Provider</label> <select id="provider"><option value="aladhan">Aladhan.com</option></select></div><div class="actions"><button id="btn-save" class="btn-primary" data-i18n="Save">Save</button></div></div></div><script defer="defer" src="options.js"></script></body></html>
